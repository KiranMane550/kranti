<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  background: linear-gradient(-45deg, #ff758c, #ff7eb3, #fad0c4, #ffdde1);
  background-size: 400% 400%;
  animation: gradient 10s ease infinite;
}

@keyframes gradient {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.card {
  width: 90%;
  max-width: 400px;
  padding: 30px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.15);
  box-shadow: 0 8px 30px rgba(0,0,0,0.2);
  text-align: center;
  color: white;
  transition: 0.6s;
}

.hidden { display: none; }

h1 { font-size: 2rem; margin-bottom: 10px; }
p { font-size: 1.2rem; opacity: 0.9; }

button {
  margin-top: 20px;
  padding: 12px 20px;
  border-radius: 30px;
  border: none;
  font-size: 1rem;
  cursor: pointer;
  transition: 0.3s;
}

.primary {
  background: #ff4d6d;
  color: white;
}
.primary:hover {
  transform: scale(1.1);
}

.yes {
  background: #28a745;
  color: white;
}
.no {
  background: #dc3545;
  color: white;
  position: absolute;
}

/* smooth fade */
.fade {
  animation: fade 0.8s ease;
}
@keyframes fade {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

/* confetti */
.confetti {
  position: absolute;
  width: 8px;
  height: 8px;
  top: 0;
  animation: fall 3s linear infinite;
}
@keyframes fall {
  to { transform: translateY(100vh) rotate(360deg); }
}
</style>
</head>

<body>

<div id="app" class="card fade">
  <h1 id="title">Hey Kranti❤️</h1>
  <p id="text">I made something special for you</p>
  <button class="primary" onclick="next()">Start</button>
</div>

<script>
let step = 0;

const story = [
  ["From the moment I met you 💕","Everything felt different..."],
  ["You make my world brighter ✨","Every day with you is special"],
  ["I cherish every moment 💖","And I want many more..."],
  ["So here it is... 💍","Something I’ve been wanting to ask"]
];

function next(){
  const app = document.getElementById("app");

  if(step < story.length){
    app.classList.remove("fade");
    void app.offsetWidth;

    document.getElementById("title").innerText = story[step][0];
    document.getElementById("text").innerText = story[step][1];

    app.classList.add("fade");
    step++;
  } else {
    showProposal();
  }
}

function showProposal(){
  const app = document.getElementById("app");

  app.innerHTML = `
    <h1>Krnati kutre Will you be mine forever? 💍</h1>
    <button class="yes" onclick="yes()">YES ❤️</button>
    <button class="no" id="noBtn">NO 😜</button>
  `;

  const noBtn = document.getElementById("noBtn");
  noBtn.onmouseover = () => {
    noBtn.style.top = Math.random()*80 + "%";
    noBtn.style.left = Math.random()*80 + "%";
  };
}

function yes(){
  const app = document.getElementById("app");

  app.innerHTML = `
    <h1>YAYYYY ❤️🎉</h1>
    <p>You just made me the happiest person alive 😘</p>
  `;

  confetti(80);
}

function confetti(n){
  for(let i=0;i<n;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*window.innerWidth+"px";
    c.style.background=`hsl(${Math.random()*360},100%,50%)`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
}
</script>

</body>
</html>
