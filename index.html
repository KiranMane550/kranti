<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  color: white;
  overflow: hidden;
  text-align: center;
}

/* screens */
.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: opacity 1s;
}
.hidden { opacity: 0; pointer-events: none; }
.visible { opacity: 1; }

/* text */
h1 { font-size: 2.5rem; }
p { font-size: 1.4rem; max-width: 80%; }

/* buttons */
button {
  margin-top: 20px;
  padding: 12px 25px;
  font-size: 1.1rem;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
.yes { background: #28a745; color: white; }
.no { background: #dc3545; color: white; position: absolute; }

/* typing */
.typing {
  border-right: 2px solid white;
  white-space: nowrap;
  overflow: hidden;
  width: 0;
  animation: typing 3s steps(30, end) forwards, blink 0.7s infinite;
}
@keyframes typing { to { width: 100%; } }
@keyframes blink { 50% { border-color: transparent; } }

/* slideshow */
img {
  width: 250px;
  border-radius: 15px;
  margin-top: 20px;
}

/* hearts */
.heart {
  position: absolute;
  width: 20px;
  height: 20px;
  background: red;
  transform: rotate(45deg);
  animation: float 5s linear infinite;
}
.heart::before, .heart::after {
  content: "";
  position: absolute;
  width: 20px;
  height: 20px;
  background: red;
  border-radius: 50%;
}
.heart::before { top: -10px; }
.heart::after { left: 10px; }

@keyframes float {
  0% { transform: translateY(0) rotate(45deg); opacity:1; }
  100% { transform: translateY(-800px) rotate(45deg); opacity:0; }
}

/* confetti */
.confetti {
  position: absolute;
  width: 10px;
  height: 10px;
  top: 0;
  animation: fall 3s linear infinite;
}
@keyframes fall {
  to { transform: translateY(100vh) rotate(360deg); }
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio autoplay loop>
  <source src="your-music.mp3" type="audio/mpeg">
</audio>

<!-- SCREEN 1 -->
<div id="s1" class="screen visible">
  <h1>Hey Love ❤️</h1>
  <button onclick="next(1)">Start</button>
</div>

<!-- STORY -->
<div id="s2" class="screen hidden">
  <p class="typing">From the moment I met you...</p>
  <button onclick="next(2)">Next</button>
</div>

<div id="s3" class="screen hidden">
  <p class="typing">Everything changed in the most beautiful way 💕</p>
  <button onclick="next(3)">Next</button>
</div>

<!-- PHOTO SLIDESHOW -->
<div id="s4" class="screen hidden">
  <h1>Our Moments 📸</h1>
  <img id="photo" src="photo1.jpg">
  <button onclick="next(4)">Next</button>
</div>

<!-- FINAL BUILDUP -->
<div id="s5" class="screen hidden">
  <p class="typing">And today I want to ask you something...</p>
  <button onclick="showProposal()">See</button>
</div>

<!-- PROPOSAL -->
<div id="proposal" class="screen hidden">
  <h1>Will you be mine forever? 💍</h1>
  <button class="yes" onclick="yesClicked()">YES ❤️</button>
  <button class="no" id="noBtn">NO 😜</button>
</div>

<!-- FINAL SUCCESS -->
<div id="final" class="screen hidden">
  <h1>YAYYYY ❤️🎉</h1>
  <p>You just made me the happiest person alive 😘</p>
</div>

<script>
let photos = ["photo1.jpg","photo2.jpg","photo3.jpg"];
let index = 0;

// screen navigation
function next(n){
  document.getElementById("s"+n).classList.replace("visible","hidden");
  document.getElementById("s"+(n+1)).classList.replace("hidden","visible");
  createHearts(10);
}

// slideshow
setInterval(()=>{
  let img = document.getElementById("photo");
  if(img){
    index = (index+1)%photos.length;
    img.src = photos[index];
  }
},2000);

// proposal screen
function showProposal(){
  document.getElementById("s5").classList.replace("visible","hidden");
  document.getElementById("proposal").classList.replace("hidden","visible");
}

// YES
function yesClicked(){
  document.getElementById("proposal").classList.replace("visible","hidden");
  document.getElementById("final").classList.replace("hidden","visible");
  createConfetti(100);
}

// NO button runs away 😂
let noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", ()=>{
  noBtn.style.top = Math.random()*80 + "%";
  noBtn.style.left = Math.random()*80 + "%";
});

// hearts
function createHearts(n){
  for(let i=0;i<n;i++){
    let h = document.createElement("div");
    h.className="heart";
    h.style.left=Math.random()*window.innerWidth+"px";
    h.style.animationDuration=3+Math.random()*5+"s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  }
}

// confetti
function createConfetti(n){
  for(let i=0;i<n;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*window.innerWidth+"px";
    c.style.background=`hsl(${Math.random()*360},100%,50%)`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
}
</script>

</body>
</html>
